# Decisão técnica: jobs paralelos reduzem o tempo de feedback
name: QA Automation Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite para executar (all/api/e2e/mobile/performance)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - api
          - e2e
          - mobile
          - performance

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  API_BASE_URL: 'https://restful-booker.herokuapp.com'
  E2E_BASE_URL: 'https://www.saucedemo.com'

jobs:
  api-tests:
    name: 'API Tests (Máquina ${{ matrix.machine }})'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'api' || github.event.inputs.suite == '' }}
    strategy:
      fail-fast: false
      matrix:
        machine: [0, 1]
        include:
          - machine: 0
            spec: 'api-tests/cypress/e2e/auth/**,api-tests/cypress/e2e/booking/create-booking.cy.js'
            name: 'Auth + Create'
          - machine: 1
            spec: 'api-tests/cypress/e2e/booking/get-booking.cy.js,api-tests/cypress/e2e/booking/update-booking.cy.js,api-tests/cypress/e2e/booking/delete-booking.cy.js,api-tests/cypress/e2e/booking/contract-validation.cy.js'
            name: 'Get + Update + Delete + Contract'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar Testes API - ${{ matrix.name }}
        run: |
          npx cypress run \
            --project api-tests \
            --spec "${{ matrix.spec }}" \
            --reporter ../node_modules/mochawesome \
            --reporter-options "reportDir=../reports/api,overwrite=false,html=false,json=true,reportFilename=api-machine-${{ matrix.machine }}"
        env:
          CYPRESS_API_BASE_URL: ${{ env.API_BASE_URL }}
          CYPRESS_ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-screenshots-machine-${{ matrix.machine }}
          path: api-tests/cypress/screenshots/
          retention-days: 7

      - name: Upload vídeos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-videos-machine-${{ matrix.machine }}
          path: api-tests/cypress/videos/
          retention-days: 7

      - name: Upload relatório JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report-machine-${{ matrix.machine }}
          path: reports/api/
          retention-days: 30

  e2e-tests:
    name: 'E2E Tests (Cypress + Cucumber)'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'e2e' || github.event.inputs.suite == '' }}
    strategy:
      fail-fast: false
      matrix:
        machine: [0, 1]
        include:
          - machine: 0
            spec: 'e2e-tests/cypress/e2e/features/login/**/*.feature'
            name: 'Login Features'
          - machine: 1
            spec: 'e2e-tests/cypress/e2e/features/checkout/**/*.feature'
            name: 'Checkout Features'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar Testes E2E - ${{ matrix.name }}
        run: |
          npx cypress run \
            --project e2e-tests \
            --spec "${{ matrix.spec }}" \
            --browser chrome \
            --reporter ../node_modules/mochawesome \
            --reporter-options "reportDir=../reports/e2e,overwrite=false,html=false,json=true,reportFilename=e2e-machine-${{ matrix.machine }}"
        env:
          CYPRESS_E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          CYPRESS_SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          CYPRESS_SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-machine-${{ matrix.machine }}
          path: e2e-tests/cypress/screenshots/
          retention-days: 7

      - name: Upload vídeos Cypress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-videos-machine-${{ matrix.machine }}
          path: e2e-tests/cypress/videos/
          retention-days: 7

      - name: Upload relatório E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-machine-${{ matrix.machine }}
          path: reports/e2e/
          retention-days: 30

  mobile-tests:
    name: 'Mobile Tests'
    runs-on: macos-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'mobile' || github.event.inputs.suite == '' }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download App de Teste
        run: |
          mkdir -p mobile-tests/app
          curl -L -o mobile-tests/app/Android-MyDemoAppRN.apk https://github.com/saucelabs/my-demo-app-rn/releases/download/v1.3.0/Android-MyDemoAppRN.1.3.0.build-244.apk

      - name: Instalar dependências
        run: npm ci

      - name: Verificar Appium e Drivers locais
        run: |
          npx appium --version
          npx appium driver list

      - name: Executar Testes Mobile (Android Emulator Action)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          target: google_apis
          arch: x86_64
          profile: Nexus 5X
          disable-animations: true
          script: npm run test:mobile
        env:
          APPIUM_HOST: localhost
          APPIUM_PORT: 4723
          ANDROID_DEVICE_NAME: emulator-5554
          ANDROID_PLATFORM_VERSION: '9.0'
          PLATFORM: android

      - name: Upload artefatos Mobile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-reports
          path: reports/mobile/
          retention-days: 14

  performance-tests:
    name: 'Performance Tests (K6)'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'performance' || github.event.inputs.suite == '' }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y
          k6 version

      - name: Criar diretório de relatórios
        run: mkdir -p reports/performance

      - name: Executar Teste de Carga
        run: npm run test:performance
        env:
          BASE_URL: ${{ env.API_BASE_URL }}
        continue-on-error: true

      - name: Upload relatório K6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: reports/performance/
          retention-days: 30

  report:
    name: 'Consolidar Relatórios'
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests, mobile-tests, performance-tests]
    if: always()
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Download artefatos API (máquina 0)
        uses: actions/download-artifact@v4
        with:
          name: api-report-machine-0
          path: reports/api/
        continue-on-error: true

      - name: Download artefatos API (máquina 1)
        uses: actions/download-artifact@v4
        with:
          name: api-report-machine-1
          path: reports/api/
        continue-on-error: true

      - name: Download artefatos E2E (máquina 0)
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-machine-0
          path: reports/e2e/
        continue-on-error: true

      - name: Download artefatos E2E (máquina 1)
        uses: actions/download-artifact@v4
        with:
          name: e2e-report-machine-1
          path: reports/e2e/
        continue-on-error: true

      - name: Download artefatos Mobile
        uses: actions/download-artifact@v4
        with:
          name: mobile-reports
          path: reports/mobile/
        continue-on-error: true

      - name: Download artefatos Performance
        uses: actions/download-artifact@v4
        with:
          name: performance-reports
          path: reports/performance/
        continue-on-error: true

      - name: Gerar relatórios HTML por escopo
        run: npm run report
        continue-on-error: true

      - name: Upload relatórios por escopo consolidados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports-consolidated-${{ github.run_number }}
          path: |
            reports/api/
            reports/e2e/
            reports/mobile/
            reports/performance/
          retention-days: 90

      - name: Sumário dos resultados no GitHub
        if: always()
        run: |
          echo "## 📊 QA Automation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile Tests | ${{ needs.mobile-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
